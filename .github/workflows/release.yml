name: Release

# Cut a release by pushing a version tag:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # allow the job to create the GitHub Release

jobs:
  build:
    runs-on: macos-15
    env:
      # Auth token is the only real secret (write scope). Org/project slugs aren't
      # sensitive, so they live as repo variables. If the token isn't set, the
      # upload step is skipped and the release still publishes normally.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so Sentry release commit association works

      # The default toolchain can ship an SDK older than our macOS 14 deployment
      # target (which broke the build on `openSettings`, a macOS 14.0 API).
      # Pin the newest Xcode installed on the runner so the SDK is >= 14.
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          swiftc --version
          xcrun --sdk macosx --show-sdk-version

      - name: Build app bundle (ad-hoc signed)
        env:
          # Baked into the bundle for opt-in crash reporting. Empty if the secret
          # isn't set, in which case crash reporting stays disabled in the build.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: SIGN_IDENTITY=- APP_VERSION="${GITHUB_REF_NAME#v}" ./make-app.sh release

      # All Sentry steps below are skipped when SENTRY_AUTH_TOKEN isn't configured,
      # so the release still publishes. sentry-cli reads org/project/token from the
      # job env.
      - name: Install sentry-cli
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: curl -sL https://sentry.io/get-cli/ | INSTALL_DIR="$RUNNER_TEMP" bash

      # Debug symbols so Sentry can symbolicate crash reports. --include-sources
      # embeds our source for in-Sentry code context (the repo is public, so
      # nothing sensitive leaks).
      - name: Upload debug symbols to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: "$RUNNER_TEMP/sentry-cli" debug-files upload --include-sources dist/Pronto.dSYM

      # Create + finalize the Sentry release for this version and associate the
      # commits since the last release, so events (tagged with the same version by
      # the app — see CrashReporting.releaseName) group by version and Sentry can
      # surface suspect commits / regressions. Commit association is best-effort:
      # --local reads the checked-out git history (needs fetch-depth: 0) and
      # --ignore-missing tolerates a first release with no prior ref; a hiccup there
      # must not fail the publish.
      - name: Create Sentry release
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SC="$RUNNER_TEMP/sentry-cli"
          "$SC" releases new "$VERSION"
          "$SC" releases set-commits "$VERSION" --local --ignore-missing || echo "::warning::commit association skipped"
          "$SC" releases finalize "$VERSION"
          "$SC" releases deploys "$VERSION" new -e production

      - name: Zip the .app
        run: ditto -c -k --keepParent dist/Pronto.app "Pronto-${GITHUB_REF_NAME}.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md <<'EOF'
          ## Install

          1. Download `Pronto-<version>.zip` below and unzip it.
          2. Move **Pronto.app** to your `/Applications` folder.
          3. **First launch only:** right-click **Pronto.app** → **Open** → **Open**.
             (Needed once because the app isn't notarized by Apple. After that it
             opens normally.)
          4. Click the cup icon in the menu bar → **Settings…** and sign in with
             your La Marzocco account.

          ---
          *Unofficial. Not affiliated with or endorsed by La Marzocco S.r.l.*
          EOF
          # --generate-notes appends a "What's Changed" section (merged PRs since
          # the previous release) after the install instructions above.
          gh release create "$GITHUB_REF_NAME" \
            "Pronto-${GITHUB_REF_NAME}.zip" \
            --title "Pronto $GITHUB_REF_NAME" \
            --notes-file notes.md \
            --generate-notes
