name: Release

# Cut a release by pushing a version tag:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # allow the job to create the GitHub Release

jobs:
  build:
    runs-on: macos-15
    env:
      # Auth token is the only real secret (write scope). Org/project slugs aren't
      # sensitive, so they live as repo variables. If the token isn't set, the
      # upload step is skipped and the release still publishes normally.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      # Developer ID signing + notarization. The cert (.p12) and its export password
      # sign the app with a stable, Apple-trusted identity; the App Store Connect API
      # key (.p8 + its Key/Issuer IDs) authenticates the notarytool submission. All
      # base64 where binary. If DEVELOPER_ID_CERT_P12_BASE64 is unset the build fails
      # loudly (a release must be signed) — see the import step's guard.
      DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
      DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
      NOTARY_API_KEY_P8_BASE64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
      NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
      NOTARY_API_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so Sentry release commit association works

      # The default toolchain can ship an SDK older than our macOS 14 deployment
      # target (which broke the build on `openSettings`, a macOS 14.0 API).
      # Pin the newest Xcode installed on the runner so the SDK is >= 14.
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(printf '%s\n' /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          swiftc --version
          xcrun --sdk macosx --show-sdk-version

      # Import the Developer ID Application cert into a throwaway keychain so codesign
      # can use it. The keychain password is generated inline (never leaves the run),
      # so it isn't a stored secret. The exported identity name is passed to the build
      # step via $GITHUB_ENV. NOTE: unlike make-app.sh's self-signed path, this p12 is
      # exported by Keychain Access / Xcode in Apple's own format, which `security
      # import` handles fine — the OpenSSL-3 p12 caveat there does not apply here.
      - name: Import Developer ID certificate
        run: |
          if [ -z "$DEVELOPER_ID_CERT_P12_BASE64" ]; then
            echo "::error::DEVELOPER_ID_CERT_P12_BASE64 is not set — cannot sign a release. See RELEASE.md." >&2
            exit 1
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # no auto-lock mid-build
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          printf '%s' "$DEVELOPER_ID_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          # Let codesign use the private key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Make the keychain visible to codesign's identity search.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          # Capture first, then match: `security … | grep | head` would SIGPIPE the
          # producers when grep/head exit early, failing under `set -o pipefail`.
          ids="$(security find-identity -v -p codesigning "$KEYCHAIN" 2>/dev/null || true)"
          IDENTITY="$(grep -m1 'Developer ID Application' <<<"$ids" | sed -E 's/.*"(.*)"/\1/')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported cert." >&2
            exit 1
          fi
          echo "Signing identity: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      # SwiftPM's parallel download of sentry-cocoa's many binary xcframeworks
      # intermittently races its own artifact cache ("… already exists in file
      # system"), killing the build before anything real happens (it sank two
      # v0.7.0 attempts back-to-back). Resolving up front with a retry — clearing
      # the artifact cache between attempts — makes the actual build start from
      # fully-downloaded artifacts.
      - name: Resolve dependencies (retry SwiftPM artifact-cache races)
        run: |
          for attempt in 1 2 3; do
            if swift package resolve; then exit 0; fi
            echo "::warning::swift package resolve failed (attempt $attempt); clearing SwiftPM artifact cache and retrying…"
            rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts
            sleep 5
          done
          exit 1

      - name: Build app bundle (Developer ID signed)
        env:
          # Baked into the bundle for opt-in crash reporting. Empty if the secret
          # isn't set, in which case crash reporting stays disabled in the build.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        # SIGN_IDENTITY comes from the import step (via $GITHUB_ENV); make-app.sh adds
        # the hardened runtime + timestamp because the identity starts "Developer ID".
        run: APP_VERSION="${GITHUB_REF_NAME#v}" ./make-app.sh release

      # Notarize the signed bundle, then staple the ticket into it so Gatekeeper
      # approves it offline (no first-launch warning). notarytool authenticates with
      # the App Store Connect API key.
      #
      # We deliberately do NOT use `notarytool submit --wait`: its long-poll aborts
      # the whole job on a single transient network error (we hit NSURLErrorDomain
      # -1009 mid-poll once, after Apple sat "In Progress" for 40+ min). Instead we
      # submit, then poll `notarytool info` in a loop that TOLERATES transient errors
      # (retries instead of failing) and caps total wait, and dump the notary log on
      # any non-Accepted verdict. Stapling runs BEFORE the zip step below, so the
      # released asset carries the ticket.
      - name: Notarize and staple
        run: |
          printf '%s' "$NOTARY_API_KEY_P8_BASE64" | base64 -d > "$RUNNER_TEMP/notary.p8"
          AUTH=(--key "$RUNNER_TEMP/notary.p8" --key-id "$NOTARY_API_KEY_ID" --issuer "$NOTARY_API_ISSUER_ID")
          ditto -c -k --keepParent dist/Pronto.app "$RUNNER_TEMP/notarize.zip"

          ID=$(xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" "${AUTH[@]}" --output-format json | jq -r '.id')
          if [ -z "$ID" ] || [ "$ID" = "null" ]; then
            echo "::error::notarytool submit did not return a submission id"; exit 1
          fi
          echo "Submission ID: $ID"

          # Poll until Apple reaches a terminal status. Apple's notary service can be
          # badly backlogged (30+ min); a transient `info` error is retried, not fatal.
          deadline=$(( $(date +%s) + 3600 ))   # give Apple up to 60 min total
          status="In Progress"
          while [ "$status" = "In Progress" ]; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Notarization still In Progress after 60 min — Apple's notary service is likely degraded; re-run this job later."
              exit 1
            fi
            sleep 30
            info=$(xcrun notarytool info "$ID" "${AUTH[@]}" --output-format json 2>/dev/null) || { echo "  (transient info error — retrying)"; continue; }
            status=$(echo "$info" | jq -r '.status // "In Progress"' 2>/dev/null || echo "In Progress")
            echo "  status: $status"
          done

          if [ "$status" != "Accepted" ]; then
            echo "::error::Notarization $status — notary log follows"
            xcrun notarytool log "$ID" "${AUTH[@]}" || true
            exit 1
          fi

          xcrun stapler staple dist/Pronto.app
          xcrun stapler validate dist/Pronto.app

      # All Sentry steps below are skipped when SENTRY_AUTH_TOKEN isn't configured,
      # so the release still publishes. sentry-cli reads org/project/token from the
      # job env.
      - name: Install sentry-cli
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: curl -sL https://sentry.io/get-cli/ | INSTALL_DIR="$RUNNER_TEMP" bash

      # Debug symbols so Sentry can symbolicate crash reports. --include-sources
      # embeds our source for in-Sentry code context (the repo is public, so
      # nothing sensitive leaks).
      - name: Upload debug symbols to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          "$RUNNER_TEMP/sentry-cli" debug-files upload --include-sources dist/Pronto.dSYM

      # Create + finalize the Sentry release for this version and associate the
      # commits since the last release, so events (tagged with the same version by
      # the app — see CrashReporting.releaseName) group by version and Sentry can
      # surface suspect commits / regressions. --auto uses Sentry's GitHub
      # integration to resolve the commit range and link commits back to GitHub
      # (needs the repo added under Sentry → Integrations → GitHub, and the
      # fetch-depth: 0 checkout for the current SHA). Commit association is
      # best-effort: a hiccup there warns but must not fail the publish.
      - name: Create Sentry release
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SC="$RUNNER_TEMP/sentry-cli"
          "$SC" releases new "$VERSION"
          "$SC" releases set-commits "$VERSION" --auto || echo "::warning::commit association skipped"
          "$SC" releases finalize "$VERSION"
          "$SC" releases deploys "$VERSION" new -e production

      - name: Zip the .app
        run: ditto -c -k --keepParent dist/Pronto.app "Pronto-${GITHUB_REF_NAME}.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md <<'EOF'
          ## Install

          1. Download `Pronto-<version>.zip` below and unzip it.
          2. Move **Pronto.app** to your `/Applications` folder.
          3. Double-click **Pronto** to launch it. (The app is signed with an Apple
             Developer ID and notarized by Apple, so it opens with no security
             warnings.)
          4. Click the cup icon in the menu bar → **Settings…** and sign in with
             your La Marzocco account.

          ---
          *Unofficial. Not affiliated with or endorsed by La Marzocco S.r.l.*
          EOF
          # --generate-notes appends a "What's Changed" section (merged PRs since
          # the previous release) after the install instructions above.
          gh release create "$GITHUB_REF_NAME" \
            "Pronto-${GITHUB_REF_NAME}.zip" \
            --title "Pronto $GITHUB_REF_NAME" \
            --notes-file notes.md \
            --generate-notes

      # Update the Homebrew tap (pacificsky/homebrew-tap) so `brew upgrade`
      # picks up this release. Skipped with a warning when HOMEBREW_TAP_TOKEN
      # (fine-grained PAT, contents:write on homebrew-tap only) isn't set; any
      # other failure fails the job loudly — the GitHub Release is already
      # published at this point, so nothing is lost, but a stale cask must be
      # visible. Casks/pronto.rb in the tap is fully generated from
      # packaging/pronto.rb.tmpl; the contents API needs the existing blob SHA
      # on update (omitting it is only valid for the first-ever create).
      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping Homebrew cask update"
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="$(shasum -a 256 "Pronto-${GITHUB_REF_NAME}.zip" | cut -d' ' -f1)"
          if [ -z "$SHA256" ]; then
            echo "::error::could not compute sha256 of Pronto-${GITHUB_REF_NAME}.zip"; exit 1
          fi
          ./packaging/render-cask.sh "$VERSION" "$SHA256" > "$RUNNER_TEMP/pronto.rb"
          EXISTING_SHA="$(gh api repos/pacificsky/homebrew-tap/contents/Casks/pronto.rb --jq .sha || true)"
          gh api --method PUT repos/pacificsky/homebrew-tap/contents/Casks/pronto.rb \
            -f message="Update pronto to v${VERSION}" \
            -f content="$(base64 -i "$RUNNER_TEMP/pronto.rb")" \
            ${EXISTING_SHA:+-f sha="$EXISTING_SHA"} \
            --jq '.commit.sha'
          echo "Tap updated for v${VERSION}"
