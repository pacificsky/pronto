name: Release

# Cut a release by pushing a version tag:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # allow the job to create the GitHub Release

jobs:
  build:
    runs-on: macos-15
    env:
      # Auth token is the only real secret (write scope). Org/project slugs aren't
      # sensitive, so they live as repo variables. If the token isn't set, the
      # upload step is skipped and the release still publishes normally.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
      # Developer ID signing + notarization. The cert (.p12) and its export password
      # sign the app with a stable, Apple-trusted identity; the App Store Connect API
      # key (.p8 + its Key/Issuer IDs) authenticates the notarytool submission. All
      # base64 where binary. If DEVELOPER_ID_CERT_P12_BASE64 is unset the build fails
      # loudly (a release must be signed) — see the import step's guard.
      DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
      DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
      NOTARY_API_KEY_P8_BASE64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
      NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
      NOTARY_API_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so Sentry release commit association works

      # The default toolchain can ship an SDK older than our macOS 14 deployment
      # target (which broke the build on `openSettings`, a macOS 14.0 API).
      # Pin the newest Xcode installed on the runner so the SDK is >= 14.
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(printf '%s\n' /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          swiftc --version
          xcrun --sdk macosx --show-sdk-version

      # Import the Developer ID Application cert into a throwaway keychain so codesign
      # can use it. The keychain password is generated inline (never leaves the run),
      # so it isn't a stored secret. The exported identity name is passed to the build
      # step via $GITHUB_ENV. NOTE: unlike make-app.sh's self-signed path, this p12 is
      # exported by Keychain Access / Xcode in Apple's own format, which `security
      # import` handles fine — the OpenSSL-3 p12 caveat there does not apply here.
      - name: Import Developer ID certificate
        run: |
          if [ -z "$DEVELOPER_ID_CERT_P12_BASE64" ]; then
            echo "::error::DEVELOPER_ID_CERT_P12_BASE64 is not set — cannot sign a release. See RELEASE.md." >&2
            exit 1
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # no auto-lock mid-build
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          printf '%s' "$DEVELOPER_ID_CERT_P12_BASE64" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          # Let codesign use the private key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Make the keychain visible to codesign's identity search.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep 'Developer ID Application' | head -1 | sed -E 's/.*"(.*)"/\1/')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported cert." >&2
            exit 1
          fi
          echo "Signing identity: $IDENTITY"
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build app bundle (Developer ID signed)
        env:
          # Baked into the bundle for opt-in crash reporting. Empty if the secret
          # isn't set, in which case crash reporting stays disabled in the build.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        # SIGN_IDENTITY comes from the import step (via $GITHUB_ENV); make-app.sh adds
        # the hardened runtime + timestamp because the identity starts "Developer ID".
        run: APP_VERSION="${GITHUB_REF_NAME#v}" ./make-app.sh release

      # Notarize the signed bundle and staple the ticket into it, so Gatekeeper
      # approves it offline (no first-launch warning). notarytool authenticates with
      # the App Store Connect API key. --wait blocks until Apple returns a verdict;
      # on rejection we dump the log and fail. Stapling happens BEFORE the zip step
      # below, so the released asset carries the ticket.
      - name: Notarize and staple
        run: |
          printf '%s' "$NOTARY_API_KEY_P8_BASE64" | base64 -d > "$RUNNER_TEMP/notary.p8"
          ditto -c -k --keepParent dist/Pronto.app "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$NOTARY_API_KEY_ID" \
            --issuer "$NOTARY_API_ISSUER_ID" \
            --wait
          xcrun stapler staple dist/Pronto.app
          xcrun stapler validate dist/Pronto.app

      # All Sentry steps below are skipped when SENTRY_AUTH_TOKEN isn't configured,
      # so the release still publishes. sentry-cli reads org/project/token from the
      # job env.
      - name: Install sentry-cli
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: curl -sL https://sentry.io/get-cli/ | INSTALL_DIR="$RUNNER_TEMP" bash

      # Debug symbols so Sentry can symbolicate crash reports. --include-sources
      # embeds our source for in-Sentry code context (the repo is public, so
      # nothing sensitive leaks).
      - name: Upload debug symbols to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          "$RUNNER_TEMP/sentry-cli" debug-files upload --include-sources dist/Pronto.dSYM

      # Create + finalize the Sentry release for this version and associate the
      # commits since the last release, so events (tagged with the same version by
      # the app — see CrashReporting.releaseName) group by version and Sentry can
      # surface suspect commits / regressions. --auto uses Sentry's GitHub
      # integration to resolve the commit range and link commits back to GitHub
      # (needs the repo added under Sentry → Integrations → GitHub, and the
      # fetch-depth: 0 checkout for the current SHA). Commit association is
      # best-effort: a hiccup there warns but must not fail the publish.
      - name: Create Sentry release
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SC="$RUNNER_TEMP/sentry-cli"
          "$SC" releases new "$VERSION"
          "$SC" releases set-commits "$VERSION" --auto || echo "::warning::commit association skipped"
          "$SC" releases finalize "$VERSION"
          "$SC" releases deploys "$VERSION" new -e production

      - name: Zip the .app
        run: ditto -c -k --keepParent dist/Pronto.app "Pronto-${GITHUB_REF_NAME}.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md <<'EOF'
          ## Install

          1. Download `Pronto-<version>.zip` below and unzip it.
          2. Move **Pronto.app** to your `/Applications` folder.
          3. Double-click **Pronto** to launch it. (The app is signed with an Apple
             Developer ID and notarized by Apple, so it opens with no security
             warnings.)
          4. Click the cup icon in the menu bar → **Settings…** and sign in with
             your La Marzocco account.

          ---
          *Unofficial. Not affiliated with or endorsed by La Marzocco S.r.l.*
          EOF
          # --generate-notes appends a "What's Changed" section (merged PRs since
          # the previous release) after the install instructions above.
          gh release create "$GITHUB_REF_NAME" \
            "Pronto-${GITHUB_REF_NAME}.zip" \
            --title "Pronto $GITHUB_REF_NAME" \
            --notes-file notes.md \
            --generate-notes
