name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # Pin the newest installed Xcode so the SDK matches the macOS 14
      # deployment target (e.g. `openSettings` is a macOS 14.0 API).
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          swift --version

      - name: Build
        run: swift build
