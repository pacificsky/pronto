name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # Pin the newest installed Xcode so the SDK matches the macOS 14
      # deployment target (e.g. `openSettings` is a macOS 14.0 API).
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(printf '%s\n' /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          swift --version

      # Same guard as release.yml: downloading sentry-cocoa's 7 binary
      # xcframeworks is flaky (transient CDN 504s), and the partial state a dead
      # download leaves behind makes naive retries fail instantly with "… already
      # exists in file system". Resolve up front with retries + state cleanup.
      - name: Resolve dependencies (retry flaky binary-artifact downloads)
        run: |
          for attempt in 1 2 3 4 5; do
            if swift package resolve; then exit 0; fi
            echo "::warning::swift package resolve failed (attempt $attempt); clearing SwiftPM state and retrying…"
            # Clear BOTH the shared artifact cache and the workspace state: a
            # download that dies mid-flight (e.g. a 504 from GitHub's asset CDN)
            # leaves partial state behind, and later attempts then fail instantly
            # with "… already exists in file system" unless both are gone.
            rm -rf .build ~/Library/Caches/org.swift.swiftpm/artifacts
            sleep $((attempt * 15))
          done
          exit 1

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  # Validate the workflow files themselves so an invalid workflow (bad YAML, a
  # quote-prefixed `run:`, a broken `if:`/expression) fails the PR instead of
  # silently breaking releases. actionlint also runs shellcheck (preinstalled on
  # the runner) over `run:` scripts.
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: actionlint
        run: |
          VER=1.7.12
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz" | tar -xz actionlint
          ./actionlint -color
